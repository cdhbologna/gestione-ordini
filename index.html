<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestione Ordini Hotel</title>

  <style>
    :root{
      --bg:#f2f2f2;
      --card:#ffffff;
      --muted:#fafafa;
      --border:#ddd;
      --accent:#3498db;
      --shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg);
      color:#111;
    }

    h1 { text-align: center; margin: 10px 0; }

    .header {
      padding: 10px;
      text-align: center;
      background: var(--card);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header input {
      font-size: 16px;
      padding: 6px 8px;
      width: 90px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    .header button{
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #111;
      color: white;
      margin-left: 6px;
      font-weight: 800;
    }
    .header button:hover{ opacity: 0.9; }
    .header button:disabled{ opacity: 0.55; cursor:not-allowed; }

    .container { display: flex; flex-direction: column; height: calc(100vh - 70px); }
    .riga { display:flex; flex:1; flex-direction:column; }

    .items, .tavoli-box-container {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .items { background: var(--card); }
    .tavoli-box-container { background: var(--muted); border-top: 3px solid var(--border); }

    .categoria-box {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0.3px;
      transition: 0.2s;
      user-select: none;
    }

    .categoria-box.active {
      outline: 2px solid var(--accent);
      background-color: #eaf3ff !important;
      color: #111;
    }

    .main { background:#e74c3c; }
    .light { background:#27ae60; }
    .croccantella { background:#c0392b; }
    .bevande { background:#2980b9; }
    .altro { background:#8e44ad; }

    .prodotti-dropdown { display:none; padding-left: 10px; overflow-y:auto; max-height: 260px; }

    .prodotto {
      padding: 14px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 800;
      transition: 0.15s;
    }
    .prodotto:hover { background: #217dbb; }
    .prodotto:active { transform: scale(0.98); }

    #altroInput { display:flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    #altroInput input, #altroInput button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      flex: 1;
      min-width: 120px;
    }
    #altroInput button{
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-weight: 900;
    }
    #altroInput button:disabled{ opacity: 0.55; cursor:not-allowed; }

    .tavolo-box {
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
      display:flex;
      flex-direction:column;
      position:relative;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    }

    .tavolo-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .pill {
      font-size: 12px;
      font-weight: 900;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eee;
    }

    ul { padding-left: 18px; margin: 8px 0 0; }
    li { margin-bottom: 8px; font-size: 15px; }

    .mini-btn {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 900;
    }
    .mini-btn.minus { background:#333; color:#fff; }
    .mini-btn.plus  { background:#0f7a2f; color:#fff; margin-left:6px; }
    .mini-btn:hover { opacity: 0.92; }
    .mini-btn:disabled{ opacity: 0.55; cursor:not-allowed; }

    .trash-btn {
      position:absolute;
      right: 8px;
      top: 8px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ffefef;
    }
    .trash-btn:disabled{ opacity: 0.55; cursor:not-allowed; }

    .azione {
      background: green;
      color: white;
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 950;
      letter-spacing: 0.2px;
    }

    .elimina-tutti {
      background: red;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 12px;
      margin-top: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: 950;
    }

    .footer-actions { padding: 10px; background: transparent; }
    button:disabled{ opacity:0.55; cursor:not-allowed; }

    .totale-giornata{
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed #bbb;
      background: #fff;
      font-weight: 950;
    }

    /* ------------------ OVERLAY SPETTACOLO (isolato) ------------------ */
    #overlaySpettacolo {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0,0,0,0.10);
      z-index: 9999;
      pointer-events: all;
      overflow: hidden;
    }
    #canvasSpettacolo {
      position:absolute;
      top:0;
      left:0;
    }

    .spettacolo-scritta{
      position:absolute;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      font-size: clamp(36px, 7vw, 76px);
      font-weight: 1000;
      color: #ff2b2b;
      text-shadow: 3px 3px 10px rgba(0,0,0,0.75);
      letter-spacing: 1px;
      user-select:none;
      white-space: nowrap;
    }

    .omino {
      position: absolute;
      width: 16px;
      height: 16px;
      animation: ballo 0.45s infinite alternate ease-in-out;
      will-change: transform, top;
      user-select: none;
    }

    @keyframes ballo {
      0%   { transform: translateY(0px) rotate(-10deg); }
      50%  { transform: translateY(-8px) rotate(10deg); }
      100% { transform: translateY(0px) rotate(-10deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .omino { animation: none; }
    }
  </style>
</head>

<body>
  <h1>Gestione Ordini Hotel</h1>

  <div class="header">
    <strong>Numero Tavolo:</strong>
    <input type="number" id="numeroTavolo" />
    <button id="btnApriTavolo">Apri Tavolo</button>
  </div>

  <div class="container riga">

    <!-- Riquadro alto: Items -->
    <div class="items" id="itemsContainer">
      <!-- menu generato via JS (menu.js) -->

      <!-- ALTRO -->
      <div class="categoria-box altro" data-target="altroProdotti">ALTRO</div>
      <div id="altroProdotti" class="prodotti-dropdown">
        <div id="altroInput">
          <input type="text" id="altroNome" placeholder="Nome Prodotto" />
          <input type="number" id="altroPrezzo" placeholder="Prezzo" step="0.01" />
          <button id="btnAltroAggiungi">Aggiungi</button>
        </div>
      </div>
    </div>

    <!-- Riquadro basso: Tavoli e ordini -->
    <div class="tavoli-box-container" id="tavoliContainer">
      <h3>Lista Tavoli</h3>
    </div>

    <!-- Chiusura Giornaliera -->
    <div class="footer-actions">
      <button class="azione" id="btnChiusura">CHIUSURA GIORNALIERA 🎆</button>
      <button class="elimina-tutti" id="btnEliminaTutti">ELIMINA TUTTI I TAVOLI 😢</button>
    </div>
  </div>

  <!-- Overlay animazione -->
  <div id="overlaySpettacolo" aria-hidden="true">
    <canvas id="canvasSpettacolo"></canvas>
    <div class="spettacolo-scritta" id="scrittaSpettacolo">SI VA A CASA!</div>
  </div>

  <!-- Menù separato -->
  <script src="./menu.js"></script>

  <script>
    // ------------------ Stato ------------------
    let tavoli = {};
    let tavoloSelezionato = null;
    let statoTavoli = {};

    // ------------------ Storage ------------------
    const STORAGE_KEY = "tavoliHotel_v1";

    function salvaDati() {
      const payload = { tavoli, tavoloSelezionato, statoTavoli };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function caricaDati() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const payload = JSON.parse(raw);
        tavoli = payload.tavoli || {};
        tavoloSelezionato = payload.tavoloSelezionato ?? null;
        statoTavoli = payload.statoTavoli || {};
      } catch {
        tavoli = {};
        tavoloSelezionato = null;
        statoTavoli = {};
      }
    }

    // ------------------ Utils ------------------
    function euro(n) { return "€" + Number(n).toFixed(2); }
    function sortTavoliKeys(obj) { return Object.keys(obj).sort((a,b) => Number(a) - Number(b)); }

    // ------------------ Costruzione Menu (da menu.js) ------------------
    function buildMenu() {
      const itemsContainer = document.getElementById("itemsContainer");
      const altroCat = itemsContainer.querySelector('.categoria-box.altro');

      (window.MENU || []).forEach(cat => {
        const catDiv = document.createElement("div");
        catDiv.className = `categoria-box ${cat.cssClass}`;
        catDiv.dataset.target = cat.id;
        catDiv.textContent = cat.label;

        const drop = document.createElement("div");
        drop.id = cat.id;
        drop.className = "prodotti-dropdown";

        (cat.items || []).forEach(it => {
          const btn = document.createElement("button");
          btn.className = "prodotto";
          btn.type = "button";
          btn.dataset.name = it.name;
          btn.dataset.price = it.price;
          btn.textContent = `${it.name} ${euro(it.price)}`;
          drop.appendChild(btn);
        });

        itemsContainer.insertBefore(drop, altroCat);
        itemsContainer.insertBefore(catDiv, drop);
      });
    }

    // ------------------ Toggle categorie robusto ------------------
    function initCategoryToggle() {
      document.querySelectorAll(".categoria-box").forEach(box => {
        box.addEventListener("click", function() {
          const id = this.dataset.target;
          const prodotti = document.getElementById(id);
          if (!prodotti) return;

          document.querySelectorAll(".prodotti-dropdown").forEach(p => {
            if (p !== prodotti) p.style.display = "none";
          });
          document.querySelectorAll(".categoria-box").forEach(c => {
            if (c !== this) c.classList.remove("active");
          });

          const isOpen = prodotti.style.display === "block";
          prodotti.style.display = isOpen ? "none" : "block";
          this.classList.toggle("active", !isOpen);
        });
      });
    }

    // ------------------ Event delegation: click prodotti ------------------
    function initProductClicks() {
      document.getElementById("itemsContainer").addEventListener("click", (e) => {
        const btn = e.target.closest(".prodotto");
        if (!btn) return;
        const nome = btn.dataset.name;
        const prezzo = parseFloat(btn.dataset.price);
        aggiungiProdotto(nome, prezzo);
      });
    }

    // ------------------ Tavoli ------------------
    function selezionaTavolo() {
      const num = document.getElementById("numeroTavolo").value;
      if (!num) return alert("Inserisci numero tavolo");

      if (!tavoli[num]) tavoli[num] = { ordine: {} };
      tavoloSelezionato = String(num);
      statoTavoli[tavoloSelezionato] = true;

      salvaDati();
      renderTavoli();
    }

    function aggiungiProdotto(nome, prezzo) {
      if (!tavoloSelezionato) return alert("Seleziona un tavolo prima");

      const ord = tavoli[tavoloSelezionato].ordine;
      if (ord[nome]) ord[nome].q++;
      else ord[nome] = { p: prezzo, q: 1 };

      salvaDati();
      renderTavoli();
    }

    function aggiungiProdottoAltro() {
      const nome = document.getElementById("altroNome").value.trim();
      const prezzo = parseFloat(document.getElementById("altroPrezzo").value);
      if (!nome || isNaN(prezzo)) return alert("Inserisci un nome e un prezzo validi");

      aggiungiProdotto(nome, prezzo);
      document.getElementById("altroNome").value = "";
      document.getElementById("altroPrezzo").value = "";
    }

    function rimuoviProdotto(tav, prod) {
      if (tavoli[tav]?.ordine?.[prod]) {
        tavoli[tav].ordine[prod].q--;
        if (tavoli[tav].ordine[prod].q <= 0) delete tavoli[tav].ordine[prod];
      }
      salvaDati();
      renderTavoli();
    }

    function incrementaProdotto(tav, prod) {
      if (tavoli[tav]?.ordine?.[prod]) {
        tavoli[tav].ordine[prod].q++;
      }
      salvaDati();
      renderTavoli();
    }

    function eliminaTavolo(tav) {
      if (confirm(`Eliminare definitivamente il tavolo ${tav}?`)) {
        delete tavoli[tav];
        delete statoTavoli[tav];
        if (tavoloSelezionato === tav) tavoloSelezionato = null;
        salvaDati();
        renderTavoli();
      }
    }

    // ------------------ Render tavoli + totale giorno ------------------
    function renderTavoli() {
      const container = document.getElementById("tavoliContainer");
      container.innerHTML = "<h3>Lista Tavoli</h3>";

      let totaleGiornata = 0;
      const keys = sortTavoliKeys(tavoli);

      for (let t of keys) {
        if (statoTavoli[t] === undefined) statoTavoli[t] = false;

        const box = document.createElement("div");
        box.className = "tavolo-box";

        if (String(tavoloSelezionato) === String(t)) {
          box.style.outline = "2px solid var(--accent)";
          box.style.boxShadow = "0 0 14px rgba(52,152,219,0.35)";
        }

        const header = document.createElement("div");
        header.className = "tavolo-header";

        const left = document.createElement("div");
        left.innerHTML = `<strong>Tavolo ${t}</strong>`;

        const right = document.createElement("div");
        right.className = "pill";
        right.textContent = statoTavoli[t] ? "APERTO" : "CHIUSO";

        header.appendChild(left);
        header.appendChild(right);

        const lista = document.createElement("ul");
        lista.style.display = statoTavoli[t] ? "block" : "none";

        let totaleTavolo = 0;

        for (let prod in tavoli[t].ordine) {
          const o = tavoli[t].ordine[prod];
          totaleTavolo += o.p * o.q;

          const li = document.createElement("li");
          const txt = document.createElement("span");
          txt.textContent = `${prod} x${o.q} ${euro(o.p * o.q)} `;

          const btnMinus = document.createElement("button");
          btnMinus.className = "mini-btn minus";
          btnMinus.type = "button";
          btnMinus.textContent = "-";
          btnMinus.addEventListener("click", (e) => {
            e.stopPropagation();
            rimuoviProdotto(String(t), prod);
          });

          const btnPlus = document.createElement("button");
          btnPlus.className = "mini-btn plus";
          btnPlus.type = "button";
          btnPlus.textContent = "+";
          btnPlus.addEventListener("click", (e) => {
            e.stopPropagation();
            incrementaProdotto(String(t), prod);
          });

          li.appendChild(txt);
          li.appendChild(btnMinus);
          li.appendChild(btnPlus);
          lista.appendChild(li);
        }

        totaleGiornata += totaleTavolo;

        const liTotale = document.createElement("li");
        liTotale.innerHTML = `<strong>Totale Tavolo: ${euro(totaleTavolo)}</strong>`;
        lista.appendChild(liTotale);

        header.addEventListener("click", () => {
          statoTavoli[t] = !statoTavoli[t];
          lista.style.display = statoTavoli[t] ? "block" : "none";
          right.textContent = statoTavoli[t] ? "APERTO" : "CHIUSO";
          salvaDati();
        });

        const btnDel = document.createElement("button");
        btnDel.className = "trash-btn";
        btnDel.type = "button";
        btnDel.textContent = "🗑️";
        btnDel.addEventListener("click", (e) => {
          e.stopPropagation();
          eliminaTavolo(String(t));
        });

        box.appendChild(header);
        box.appendChild(lista);
        box.appendChild(btnDel);
        container.appendChild(box);
      }

      const totaleBox = document.createElement("div");
      totaleBox.className = "totale-giornata";
      totaleBox.innerHTML = `Totale Giornaliero: ${euro(totaleGiornata)}`;
      container.appendChild(totaleBox);
    }

    // ------------------ Export TXT (pure function) ------------------
    function generaFileChiusuraTxt() {
      if (Object.keys(tavoli).length === 0) {
        alert("Nessun tavolo da esportare");
        return false;
      }

      const data = new Date();
      const filename = `riepilogo_${data.getFullYear()}-${String(data.getMonth()+1).padStart(2,"0")}-${String(data.getDate()).padStart(2,"0")}.txt`;

      let contenuto = "Riepilogo giornaliero " + data.toLocaleDateString() + "\n\n";
      let totaleGiornata = 0;

      for (let t of sortTavoliKeys(tavoli)) {
        contenuto += `Tavolo ${t}:\n`;
        let totaleTavolo = 0;

        for (let p in tavoli[t].ordine) {
          const o = tavoli[t].ordine[p];
          contenuto += `  ${p} x${o.q} ${euro(o.p * o.q)}\n`;
          totaleTavolo += o.p * o.q;
        }

        contenuto += `  Totale Tavolo: ${euro(totaleTavolo)}\n\n`;
        totaleGiornata += totaleTavolo;
      }

      contenuto += `TOTALE GIORNATA: ${euro(totaleGiornata)}\n`;

      const blob = new Blob([contenuto], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();

      return true;
    }

    // ------------------ Animazione spettacolo (clean) ------------------
    function createRandomColorHex() {
      return Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
    }

    function startSpettacolo() {
      const overlay = document.getElementById("overlaySpettacolo");
      const canvas = document.getElementById("canvasSpettacolo");
      const ctx = canvas.getContext("2d");

      // reset display + transform
      overlay.style.display = "block";
      overlay.style.transform = "translate(0px, 0px)";

      // resize
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();

      const state = {
        running: true,
        fuochi: [],
        particelle: [],
        omini: [],
        intervalId: null,
        rafId: null,
        onResize: resize
      };

      window.addEventListener("resize", state.onResize);

      function creaOmini() {
        const count = 36;
        for (let i = 0; i < count; i++) {
          const omino = document.createElement("div");
          omino.className = "omino";
          omino.style.left = Math.random() * window.innerWidth + "px";
          omino.style.top = Math.random() * window.innerHeight + "px";

          const shirt = createRandomColorHex();
          omino.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 16 16">
              <rect x="6" y="0" width="4" height="4" fill="#ffcc99"/>
              <rect x="4" y="4" width="8" height="6" fill="#${shirt}"/>
              <rect x="4" y="10" width="3" height="6" fill="#663300"/>
              <rect x="9" y="10" width="3" height="6" fill="#663300"/>
            </svg>
          `;
          overlay.appendChild(omino);
          state.omini.push(omino);
        }
      }

      function creaFuoco() {
        const x = Math.random() * canvas.width;
        const y = canvas.height;
        const colore = Math.random() * 360;
        state.fuochi.push({ x, y, vy: Math.random() * -10 - 6, esploso: false, colore });
      }

      function creaParticelle(x, y, colore) {
        const count = 80;
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 6 + 2;
          state.particelle.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            fade: Math.random() * 0.03 + 0.01,
            color: colore
          });
        }
      }

      function jumpOminiNear(x, y) {
        state.omini.forEach(o => {
          const ox = parseFloat(o.style.left);
          const oy = parseFloat(o.style.top);
          if (Math.abs(ox - x) < 100 && Math.abs(oy - y) < 100) {
            o.style.transition = "top 0.18s";
            o.style.top = (oy - 30 + Math.random() * 20) + "px";
          }
        });
      }

      function animate() {
        if (!state.running) return;

        // shake leggero
        const sx = (Math.random() - 0.5) * 6;
        const sy = (Math.random() - 0.5) * 6;
        overlay.style.transform = `translate(${sx}px, ${sy}px)`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // fuochi
        for (let i = state.fuochi.length - 1; i >= 0; i--) {
          const f = state.fuochi[i];
          f.y += f.vy;
          f.vy += 0.2;

          ctx.beginPath();
          ctx.arc(f.x, f.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = `hsl(${f.colore}, 100%, 50%)`;
          ctx.fill();

          if (!f.esploso && f.vy >= 0) {
            f.esploso = true;
            creaParticelle(f.x, f.y, f.colore);
            jumpOminiNear(f.x, f.y);
            state.fuochi.splice(i, 1);
          }
        }

        // particelle
        for (let i = state.particelle.length - 1; i >= 0; i--) {
          const p = state.particelle[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.alpha -= p.fade;

          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.color}, 100%, 50%, ${p.alpha})`;
          ctx.fill();

          if (p.alpha <= 0) state.particelle.splice(i, 1);
        }

        state.rafId = requestAnimationFrame(animate);
      }

      creaOmini();
      state.intervalId = setInterval(creaFuoco, 420);
      state.rafId = requestAnimationFrame(animate);

      return state;
    }

    function stopSpettacolo(state) {
      const overlay = document.getElementById("overlaySpettacolo");
      const canvas = document.getElementById("canvasSpettacolo");
      const ctx = canvas.getContext("2d");

      if (!state) {
        overlay.style.display = "none";
        overlay.style.transform = "translate(0px, 0px)";
        ctx.clearRect(0,0,canvas.width,canvas.height);
        return;
      }

      state.running = false;
      if (state.intervalId) clearInterval(state.intervalId);
      if (state.rafId) cancelAnimationFrame(state.rafId);
      window.removeEventListener("resize", state.onResize);

      // rimuove omini
      state.omini.forEach(o => o.remove());

      // pulizia canvas + overlay
      overlay.style.transform = "translate(0px, 0px)";
      overlay.style.display = "none";
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }

    // ------------------ UI Lock ------------------
    function setUiDisabled(disabled) {
      document.getElementById("btnApriTavolo").disabled = disabled;
      document.getElementById("btnAltroAggiungi").disabled = disabled;
      document.getElementById("btnChiusura").disabled = disabled;
      document.getElementById("btnEliminaTutti").disabled = disabled;
      document.querySelectorAll(".prodotto, .mini-btn, .trash-btn").forEach(el => el.disabled = disabled);
    }

    // ------------------ Chiusura Giornaliera con animazione ------------------
    async function chiusuraGiornalieraConSpettacolo() {
      // precheck prima di far casino
      if (Object.keys(tavoli).length === 0) return alert("Nessun tavolo da esportare");

      setUiDisabled(true);

      let spettacoloState = null;
      try {
        spettacoloState = startSpettacolo();

        // dopo un po' esporta (senza sapere durata precisa: scelgo un tempo "giusto")
        await new Promise(res => setTimeout(res, 3500));
        generaFileChiusuraTxt();

        // lascia respirare ancora un attimo e chiudi
        await new Promise(res => setTimeout(res, 1100));
      } finally {
        stopSpettacolo(spettacoloState);
        setUiDisabled(false);
      }
    }

    // ------------------ Elimina tutti ------------------
    function eliminaTuttiTavoli() {
      if (!confirm("Sicuro di voler eliminare tutti i tavoli?")) return;
      if (!confirm("MA SEI PROPRIO SICURO? NON SI TORNA INDIETRO 😢")) return;

      tavoli = {};
      tavoloSelezionato = null;
      statoTavoli = {};
      salvaDati();
      renderTavoli();
    }

    // ------------------ Init ------------------
    function init() {
      caricaDati();

      buildMenu();
      initCategoryToggle();
      initProductClicks();

      document.getElementById("btnApriTavolo").addEventListener("click", selezionaTavolo);
      document.getElementById("btnAltroAggiungi").addEventListener("click", aggiungiProdottoAltro);
      document.getElementById("btnChiusura").addEventListener("click", chiusuraGiornalieraConSpettacolo);
      document.getElementById("btnEliminaTutti").addEventListener("click", eliminaTuttiTavoli);

      renderTavoli();
    }

    init();
  </script>
</body>
</html>
